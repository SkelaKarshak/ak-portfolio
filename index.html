        body {
            margin: 0;
            background-color: #050505;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        
        .slide-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .slide-container::-webkit-scrollbar { display: none; }
        
        .slide {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: #000;
        }
        
        .slide-content {
            position: relative;
            /* 16:9 aspect ratio */
            width: 100vw;
            height: calc(100vw * 9 / 16);
            max-height: 100vh;
            max-width: calc(100vh * 16 / 9);
        }
        
        .slide-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .hyperlink {
            position: absolute;
            cursor: pointer;
            z-index: 10;
            /* background-color: rgba(255, 0, 0, 0.3); Uncomment to debug link areas */
        }
        
        /* Navigation Dots */
        .dot-nav {
            position: fixed;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
        }
        .dot-nav ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 0;
            margin: 0;
        }
        .dot-nav li {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.4s ease;
        }
        .dot-nav li:hover { background-color: rgba(255, 255, 255, 0.6); transform: scale(1.2); }
        .dot-nav li.active { background-color: #fff; transform: scale(1.4); box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
    </style>
